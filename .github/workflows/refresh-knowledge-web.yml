name: Refresh Knowledge Web

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "projects/**"
      - "knowledge/**"
      - "automation/**"
      - "scripts/refresh-knowledge-web.mjs"
      - ".github/workflows/refresh-knowledge-web.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh generated pages
        run: node scripts/refresh-knowledge-web.mjs

      - name: Auto-commit updates
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add knowledge/projects-index.md knowledge/link-map.md
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(knowledge): refresh generated link pages"
            git push
          else
            echo "No generated changes to commit."
          fi
