name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with dev deps
        run: python -m pip install -U pip && python -m pip install -e ".[dev]"

      - name: Docs plans index
        run: python scripts/generate_plans_readme.py --check

      - name: Ruff
        run: python -m ruff check .

      - name: Pytest
        run: python -m pytest -q

      - name: Git hooks and install script sanity
        run: test -x .githooks/pre-push && test -x scripts/git-hooks/install.sh && sh -n scripts/git-hooks/install.sh
