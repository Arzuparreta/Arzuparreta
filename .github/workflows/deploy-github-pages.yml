# Builds the Astro site from web/ and pushes static output to Arzuparreta.github.io (gh-pages).
# User site https://arzuparreta.github.io/ must be served from that repo; this monorepo holds source.
#
# One-time setup:
# 1. Create a fine-grained PAT (or classic repo PAT) with Contents: Read and write on Arzuparreta.github.io.
#    Add repository secret GH_PAGES_DEPLOY_TOKEN on Arzuparreta/Arzuparreta.
# 2. In https://github.com/Arzuparreta/Arzuparreta.github.io → Settings → Pages:
#    Build and deployment → Source: Deploy from a branch → Branch: gh-pages / (root).
#    (Replace the previous "GitHub Actions" artifact source once gh-pages has a successful deploy.)
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'cv/**'
      - '.github/workflows/deploy-github-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-github-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build
        working-directory: web
        run: npm ci && npm run build

      - name: Deploy to Arzuparreta.github.io
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: web/dist
          branch: gh-pages
          repository-name: Arzuparreta/Arzuparreta.github.io
          token: ${{ secrets.GH_PAGES_DEPLOY_TOKEN }}
          clean: true
