# Build from web/ + cv/, deploy static site to Arzuparreta.github.io branch gh-pages (needs GH_PAGES_DEPLOY_TOKEN).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'cv/**'
      - '.github/workflows/deploy-github-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-github-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build
        working-directory: web
        run: npm ci && npm run build

      - name: Deploy to Arzuparreta.github.io
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: web/dist
          branch: gh-pages
          repository-name: Arzuparreta/Arzuparreta.github.io
          token: ${{ secrets.GH_PAGES_DEPLOY_TOKEN }}
          clean: true
