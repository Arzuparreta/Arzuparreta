# Regenerate GitHub profile README from portfolio.json (single source of truth).
name: Sync README projects

on:
  push:
    branches: [main]
    paths:
      - 'portfolio.json'
      - 'scripts/sync-readme.mjs'
      - '.github/workflows/sync-readme.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-readme
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Regenerate README from profile + projects
        run: node scripts/sync-readme.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "README already up to date."
          else
            git commit -m "docs: sync profile README from portfolio.json"
            git push
          fi
