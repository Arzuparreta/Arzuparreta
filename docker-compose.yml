services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-logpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-logpilot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-logpilot} -d ${POSTGRES_DB:-logpilot}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  logpilot:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://logpilot:changeme@postgres:5432/logpilot}
      # Host Ollama from inside the container (extra_hosts below). Overrides .env so host CLIs can use 127.0.0.1.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      # Live container state (RestartCount, running/stopped) for `logpilot ask` — set false in `.env` to opt out
      DOCKER_QUERY_ON_DEMAND: ${DOCKER_QUERY_ON_DEMAND:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${DOCKER_LOG_ROOT:-/var/lib/docker/containers}:/var/lib/docker/containers:ro
      # Host Docker Engine API (read-only mount) — required for live container inspect in answers (`DOCKER_QUERY_ON_DEMAND`)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Host systemd system bus — enables native unit status from inside this container (`busctl --system`; `systemctl`
      # often refuses non-PID-1 runtimes even with this mount). Linux systemd hosts only; comment out if compose fails.
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
      # Host syslog-style logs (Debian/Ubuntu/Arch); override with HOST_LOG_ROOT if needed
      - ${HOST_LOG_ROOT:-/var/log}:/var/log:ro
      # --- systemd journal (homelab): uncomment when .env matches ---
      # 1) On an existing DB, run migrations first: restart logpilot (entrypoint runs alembic) or
      #    `alembic upgrade head` so table `journal_cursors` exists before JOURNAL_INGEST=true.
      # 2) In .env: JOURNAL_INGEST=true, JOURNAL_DIRECTORY=/var/log/journal (same path as mount target below).
      # 3) Optional: JOURNAL_MACHINE_ID=<output of host `cat /etc/machine-id`> for stable cursors across
      #    container recreate when reusing the same mounted journal.
      # 4) If reads fail, run the container user in the host's systemd-journal group or adjust ACLs.
      # - /var/log/journal:/var/log/journal:ro
    ports:
      - "${LOGPILOT_API_PORT:-8080}:${LOGPILOT_API_PORT:-8080}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:$${LOGPILOT_API_PORT:-8080}/health >/dev/null",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s
    command: ["/app/docker/entrypoint.sh"]

volumes:
  postgres_data:
